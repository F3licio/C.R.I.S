<!DOCTYPE html>

<body>

                    <input type="checkbox">
                    Lembrar-me
                </label>

                <a href="file:///C:/Users/romeu/Downloads/site/CADASTRO/index.html" style="color: #800000;">Encontrar Agente Perdido</a>
            </div>

            <button type="submit" class="btn-login" style="background: #800000; color: #ffffff;">
                Entrar
            </button>

        </form>

    </div>

</body>
</html>
